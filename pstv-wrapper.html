<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>PARTYstation fullscreen</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050308;color:#fff}
    #wrap{position:fixed;left:0;top:0;width:100vw;height:100vh;overflow:hidden;background:#050308}
    #stage{position:absolute;left:0;top:0;width:1920px;height:1080px;transform-origin:0 0;background:#050308}
    iframe{display:block;width:1920px;height:1080px;border:0;background:#050308;outline:0}
    #hint{position:fixed;left:24px;bottom:18px;z-index:5;padding:8px 12px;border-radius:999px;background:rgba(0,0,0,.45);font:700 13px system-ui,sans-serif;color:rgba(255,255,255,.78);opacity:.9;transition:opacity .25s;pointer-events:none}
    body.ready #hint{opacity:.55}
    #topnav{position:fixed;left:280px;right:150px;top:28px;z-index:6;display:none;gap:14px;align-items:center;justify-content:center;pointer-events:none}
    #topnav.active{display:flex}
    #topnav button{height:46px;border:0;border-radius:999px;padding:0 22px;background:rgba(20,18,34,.78);color:#fff;font:850 16px system-ui,sans-serif;box-shadow:0 12px 36px rgba(0,0,0,.35)}
    #topnav button.focus{background:#fff;color:#141222;box-shadow:0 0 0 4px rgba(120,160,255,.55),0 14px 38px rgba(0,0,0,.45)}
  </style>
</head>
<body>
  <div id="wrap"><div id="stage"><iframe id="game" allow="autoplay; fullscreen; clipboard-read; clipboard-write" tabindex="0"></iframe></div></div>
  <div id="topnav"><button>Главная</button><button>Самые-самые</button><button>Музыкальные</button><button>Для компании</button><button>Все игры</button><button>Моё</button></div>
  <div id="hint">↑ — подсказка шапки · ←/→ — пункты · ↓ — обратно</div>
  <script>
    (function(){
      var DEFAULT_URL='https://pstv.ru/tv/';
      var qs=new URLSearchParams(location.search);
      var target=qs.get('target')||DEFAULT_URL;
      if(!/^https:\/\/(pstv\.ru|www\.pstv\.ru)\/tv\//i.test(target)) target=DEFAULT_URL;
      var stage=document.getElementById('stage');
      var frame=document.getElementById('game');
      function scale(){
        var sx=window.innerWidth/1920;
        var sy=window.innerHeight/1080;
        var s=Math.min(sx,sy);
        stage.style.transform='scale('+s+')';
        stage.style.left=Math.max(0,(window.innerWidth-1920*s)/2)+'px';
        stage.style.top=Math.max(0,(window.innerHeight-1080*s)/2)+'px';
      }
      var nav=document.getElementById('topnav'), navActive=false, navIndex=0;
      function paintNav(){ var bs=[].slice.call(nav.querySelectorAll('button')); bs.forEach(function(b,i){ b.classList.toggle('focus',i===navIndex); }); }
      function setNav(v){ navActive=v; nav.classList.toggle('active',v); paintNav(); }
      function focusGame(){ if(navActive) return; try{ frame.focus(); }catch(e){} }
      frame.src=target;
      frame.addEventListener('load',function(){ document.body.classList.add('ready'); setTimeout(focusGame,250); });
      window.addEventListener('resize',scale);
      document.addEventListener('click',focusGame,true);
      document.addEventListener('keydown',function(e){
        var k=e.key||e.code;
        if(k==='ArrowUp' && !navActive){ e.preventDefault(); e.stopPropagation(); if(e.stopImmediatePropagation)e.stopImmediatePropagation(); navIndex=0; setNav(true); return false; }
        if(navActive){
          if(k==='ArrowLeft') navIndex=Math.max(0,navIndex-1);
          else if(k==='ArrowRight') navIndex=Math.min(nav.querySelectorAll('button').length-1,navIndex+1);
          else if(k==='ArrowDown'||k==='Escape'||k==='Backspace'){ setNav(false); setTimeout(focusGame,80); }
          else if(k==='Enter'||k==='NumpadEnter'||k===' '||k==='Space'){ setNav(false); setTimeout(focusGame,80); }
          else return;
          paintNav(); e.preventDefault(); e.stopPropagation(); if(e.stopImmediatePropagation)e.stopImmediatePropagation(); return false;
        }
        focusGame();
      },true);
      scale(); focusGame(); setTimeout(focusGame,800);
    })();
  </script>
</body>
</html>
